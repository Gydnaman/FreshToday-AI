openapi: 3.0.3
info:
  title: GreenBite MVP API
  version: 1.0.0
  description: |
    GreenBite MVP (Sprint 1) HTTP API. Authoritative contract lives in
    `docs/bmad/api-contract.md` §2.0 — this YAML mirrors that document
    so it can be imported into Postman / Insomnia / Stoplight to drive
    automated mocking and contract tests.

    Conventions:
      * All paths are prefixed with `/api` (Laravel `apiPrefix:'api'`).
      * All responses are JSON; auth uses Laravel Sanctum SPA mode
        (Session Cookie + CSRF for browser flows, bearer token for
        programmatic clients via `Authorization: Bearer <token>`).
      * Webhook endpoints do NOT require auth; they verify provider
        signatures (HMAC-SHA256) and use `provider_event_id` for
        idempotency.

    Generated by: golf (Sprint 1 Day 2 — P0-2 文档债 #4)
    Source controllers: `app/Http/Controllers/Api/*.php`

servers:
  - url: https://greenbite.example.com/api
    description: Production (planned)
  - url: https://staging.greenbite.example.com/api
    description: Staging
  - url: http://localhost:8000/api
    description: Local dev (php artisan serve)

tags:
  - name: Auth
    description: 注册 / 登录 / 登出 / 当前用户
  - name: Catalog
    description: 商品与分类
  - name: Cart
    description: 购物车
  - name: Orders
    description: 订单生命周期
  - name: Survey
    description: 健康问卷
  - name: AIMenu
    description: Gemini AI 菜单
  - name: Subscriptions
    description: 周期订阅
  - name: Webhooks
    description: 支付网关回调
  - name: Debug
    description: staging-only 调试端点

security:
  - bearerAuth: []
  - {}

paths:
  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User created and logged in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSuccessResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409':
          description: Email already taken
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /login:
    post:
      tags: [Auth]
      summary: Email + password login (sets Sanctum session cookie)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSuccessResponse' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /logout:
    post:
      tags: [Auth]
      summary: Logout current session
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /me:
    get:
      tags: [Auth]
      summary: Get current user + preferences
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserProfile' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /products:
    get:
      tags: [Catalog]
      summary: List products (cached 5 min, tag products:list)
      security: []
      parameters:
        - in: query
          name: category_id
          schema: { type: integer }
        - in: query
          name: is_organic
          schema: { type: boolean }
        - in: query
          name: q
          schema: { type: string, description: Search term }
        - in: query
          name: sort
          schema: { type: string, enum: [price_asc, price_desc, newest] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  meta: { $ref: '#/components/schemas/Pagination' }

  /products/{id}:
    get:
      tags: [Catalog]
      summary: Product detail
      security: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      tags: [Catalog]
      summary: Category tree (cached 1 h, tag categories:tree)
      security: []
      responses:
        '200':
          description: Categories (2-level nested)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
                  meta: { $ref: '#/components/schemas/Meta' }

  /cart:
    get:
      tags: [Cart]
      summary: List cart items
      responses:
        '200':
          description: Cart with computed total
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
    post:
      tags: [Cart]
      summary: Add a product to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, quantity]
              properties:
                product_id: { type: integer }
                quantity:   { type: integer, minimum: 1 }
      responses:
        '201':
          description: Item added
          content:
            application/json:
              schema:
                type: object
                properties:
                  item: { $ref: '#/components/schemas/CartItem' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Out of stock
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /cart/{item}:
    patch:
      tags: [Cart]
      summary: Update cart item quantity (0 = remove)
      parameters:
        - in: path
          name: item
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                type: object
                properties:
                  item: { $ref: '#/components/schemas/CartItem' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Cart]
      summary: Remove cart item
      parameters:
        - in: path
          name: item
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Removed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /orders:
    get:
      tags: [Orders]
      summary: List current user orders
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/OrderStatus' }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
                  meta: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Orders]
      summary: Create an order from cart (reserves stock, clears cart)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409':
          description: Out of stock or other conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Min order amount not reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Order detail (owner or admin)
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /orders/{id}/pay:
    post:
      tags: [Orders]
      summary: Create payment intent for an order
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, return_url]
              properties:
                provider: { type: string, enum: [stripe, payme, alipay_hk] }
                return_url: { type: string, format: uri }
      responses:
        '200':
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment: { $ref: '#/components/schemas/Payment' }
                  redirect_url: { type: string, format: uri, nullable: true }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Order already paid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Invalid status transition
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /survey:
    get:
      tags: [Survey]
      summary: Get current user preference profile
      responses:
        '200':
          description: Preference profile (null if not filled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/UserPreference'
                      - type: 'null'
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Survey]
      summary: Upsert preference profile; triggers async AI menu generation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SurveySubmitRequest' }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserPreference' }
        '400': { $ref: '#/components/responses/ValidationError' }

  /menu/today:
    get:
      tags: [AIMenu]
      summary: Get today AI-generated menu
      responses:
        '200':
          description: Daily menu
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/DailyMenu' }
        '404':
          description: User has no preferences yet
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '503':
          description: AI unavailable and no cached menu
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /menu/regenerate:
    post:
      tags: [AIMenu]
      summary: Regenerate today menu (rate-limited 3/day)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                override_preferences:
                  $ref: '#/components/schemas/SurveySubmitRequest'
      responses:
        '200':
          description: Regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/DailyMenu' }
        '429':
          description: Daily quota exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '503':
          description: AI unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /subscriptions:
    get:
      tags: [Subscriptions]
      summary: List plans + current user active subscriptions
      responses:
        '200':
          description: Plans and user subs
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items: { $ref: '#/components/schemas/SubscriptionPlan' }
                  user_subscriptions:
                    type: array
                    items: { $ref: '#/components/schemas/UserSubscription' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Subscriptions]
      summary: Subscribe to a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_plan_id, start_date]
              properties:
                subscription_plan_id: { type: integer }
                start_date: { type: string, format: date }
                auto_renew: { type: boolean, default: true }
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserSubscription' }
        '404':
          description: Plan not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Already has an active subscription
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /subscriptions/{id}:
    delete:
      tags: [Subscriptions]
      summary: Cancel a subscription (effective end of current cycle)
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserSubscription' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Already cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /stripe/webhook:
    post:
      tags: [Webhooks]
      summary: Stripe payment webhook (HMAC + provider_event_id dedupe)
      security: []
      parameters:
        - in: header
          name: Stripe-Signature
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event payload
              additionalProperties: true
      responses:
        '200':
          description: Event received (or duplicate, idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean }
        '401':
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /payme/webhook:
    post:
      tags: [Webhooks]
      summary: PayMe payment webhook (HMAC + provider_event_id dedupe)
      security: []
      parameters:
        - in: header
          name: X-Payme-Signature
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean }
        '401':
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /test/orders/{orderId}:
    get:
      tags: [Debug]
      summary: '[staging-only] Raw DB state for QA assertions'
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Raw order row
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404': { $ref: '#/components/responses/NotFound' }

  /test/tick:
    post:
      tags: [Debug]
      summary: '[staging-only] Advance Carbon clock for time-travel tests'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advance_seconds]
              properties:
                advance_seconds: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Clock advanced
          content:
            application/json:
              schema:
                type: object
                properties:
                  advanced_seconds: { type: integer }
                  new_now: { type: string, format: date-time }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: |
        Sanctum personal access token. Browser flows also accept the
        XSRF-TOKEN + greenbite_session cookie pair.
    sessionCookie:
      type: apiKey
      in: cookie
      name: greenbite_session
      description: Sanctum SPA session cookie (issued by /login).

  parameters:
    PathId:
      in: path
      name: id
      required: true
      schema: { type: integer, minimum: 1 }

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthenticated:
      description: Missing or invalid auth
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Resource ownership mismatch
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    Meta:
      type: object
      properties:
        request_id: { type: string, format: uuid }
        timestamp:  { type: string, format: date-time }

    Pagination:
      type: object
      properties:
        page:        { type: integer }
        per_page:    { type: integer }
        total:       { type: integer }
        total_pages: { type: integer }

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:    { type: string, example: VALIDATION_FAILED }
            message: { type: string }
            details: { type: object, additionalProperties: true }
        meta: { $ref: '#/components/schemas/Meta' }

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:                  { type: string, minLength: 1, maxLength: 100 }
        email:                 { type: string, format: email }
        password:              { type: string, minLength: 8 }
        password_confirmation: { type: string }
        locale:                { type: string, enum: [zh-HK, en, zh-CN] }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }
        remember: { type: boolean, default: false }

    AuthSuccessResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:         { $ref: '#/components/schemas/User' }
            access_token: { type: string, nullable: true }
        meta: { $ref: '#/components/schemas/Meta' }

    User:
      type: object
      properties:
        id:       { type: integer }
        name:     { type: string }
        email:    { type: string, format: email }
        phone:    { type: string, nullable: true }
        locale:   { type: string, enum: [zh-HK, en, zh-CN] }
        is_admin: { type: boolean }

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            preferences:
              oneOf:
                - $ref: '#/components/schemas/UserPreference'
                - type: 'null'
            notification_preferences:
              $ref: '#/components/schemas/NotificationPreference'

    Category:
      type: object
      properties:
        id:   { type: integer }
        name: { type: string }
        slug: { type: string }
        children:
          type: array
          items: { $ref: '#/components/schemas/Category' }

    Product:
      type: object
      properties:
        id:               { type: integer }
        name:             { type: string }
        description:      { type: string, nullable: true }
        price:            { type: number, format: float, description: HKD }
        image:            { type: string, format: uri, nullable: true }
        carbon_footprint: { type: number, format: float, nullable: true }
        stock:            { type: integer }
        is_organic:       { type: boolean }
        origin:           { type: string, nullable: true }
        category:
          type: object
          properties:
            id:   { type: integer }
            name: { type: string }

    CartItem:
      type: object
      properties:
        id:       { type: integer }
        product:  { $ref: '#/components/schemas/Product' }
        quantity: { type: integer, minimum: 1 }
        subtotal: { type: number, format: float }

    Cart:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        total:      { type: number, format: float }
        item_count: { type: integer }

    OrderStatus:
      type: string
      enum: [pending, paid, processing, shipped, delivered, cancelled, refunded]
      description: 7 态 SSOT — see docs/bmad/order-state-machine.md §A.

    Order:
      type: object
      properties:
        id:          { type: integer }
        order_no:    { type: string, example: GB-2026-0612-001 }
        status:      { $ref: '#/components/schemas/OrderStatus' }
        total_price: { type: number, format: float }
        currency:    { type: string, example: HKD }
        shipping_address:
          type: object
          additionalProperties: true
        items:
          type: array
          items:
            type: object
            properties:
              id:           { type: integer }
              product_id:   { type: integer }
              product_name: { type: string }
              quantity:     { type: integer }
              unit_price:   { type: number, format: float }
              subtotal:     { type: number, format: float }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateOrderRequest:
      type: object
      required: [items, shipping_address]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: integer }
              quantity:   { type: integer, minimum: 1 }
        shipping_address:
          type: object
          required: [line1, district]
          properties:
            line1:        { type: string }
            line2:        { type: string, nullable: true }
            district:     { type: string }
            city:         { type: string, example: Hong Kong }
            postal_code:  { type: string }
        coupon_code:          { type: string, nullable: true }
        user_subscription_id: { type: integer, nullable: true }

    Payment:
      type: object
      properties:
        id:         { type: integer }
        provider:   { type: string, enum: [stripe, payme, alipay_hk] }
        amount:     { type: number, format: float }
        currency:   { type: string, example: HKD }
        status:     { type: string, enum: [pending, succeeded, failed, refunded] }
        created_at: { type: string, format: date-time }

    UserPreference:
      type: object
      properties:
        user_id:         { type: integer }
        usage_purpose:   { type: string }
        dietary_habits:  { type: string }
        goals:           { type: array, items: { type: string } }
        allergies:       { type: array, items: { type: string } }
        household_size:  { type: integer }
        cooking_skill:   { type: string, enum: [Beginner, Intermediate, Advanced] }
        budget_hkd:      { type: number, format: float }

    SurveySubmitRequest:
      type: object
      required: [usage_purpose, dietary_habits, goals]
      properties:
        usage_purpose:  { type: string }
        dietary_habits: { type: string }
        goals:          { type: array, items: { type: string } }
        allergies:      { type: array, items: { type: string } }
        household_size: { type: integer, minimum: 1 }
        cooking_skill:  { type: string, enum: [Beginner, Intermediate, Advanced] }
        budget_hkd:     { type: number, format: float }

    NotificationPreference:
      type: object
      properties:
        channel_email:     { type: boolean }
        channel_sms:       { type: boolean }
        channel_inapp:     { type: boolean }
        quiet_hours_start: { type: string, example: '22:00' }
        quiet_hours_end:   { type: string, example: '08:00' }

    DailyMenu:
      type: object
      properties:
        date:    { type: string, format: date }
        content: { type: string, description: Markdown meal plan }
        source:  { type: string, enum: [gemini, cache, fallback] }
        cached:  { type: boolean }
        tokens_used: { type: integer, nullable: true }

    SubscriptionPlan:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string, example: Family Box (Weekly) }
        code:        { type: string, example: family_weekly }
        price_hkd:   { type: number, format: float }
        interval:    { type: string, enum: [weekly, biweekly, monthly] }
        items_count: { type: integer }
        carbon_saving_kg: { type: number, format: float }

    UserSubscription:
      type: object
      properties:
        id:                  { type: integer }
        user_id:             { type: integer }
        subscription_plan_id:{ type: integer }
        status:              { type: string, enum: [active, paused, cancelled, expired] }
        start_date:          { type: string, format: date }
        end_date:            { type: string, format: date, nullable: true }
        next_fulfillment_at: { type: string, format: date-time, nullable: true }
        auto_renew:          { type: boolean }
        created_at:          { type: string, format: date-time }
        updated_at:          { type: string, format: date-time }
