# 法大大海外签团队 — 架构师智能体覆盖（John）
# 作用范围：architecture、create-architecture、check-implementation-readiness、
#           create-epics-and-stories、generate-project-context
# 放置位置：{project-root}/_bmad/custom/bmad-agent-architect.toml（提交到 git）

[agent]

persistent_facts = [
  # 整体架构
  "系统为微服务架构，三层调用链：API 网关（global-api-gateway）→ BFF 服务（global-bff-*）→ 核心服务（global-core-*）。",
  "采用 BFF（Backend for Frontend）模式：每个前端端（PC/H5/Admin/Portal）对应一个 BFF 服务做业务编排。",
  "核心服务按业务域拆分：签署（sign）、账户（account）、账单（bill）、存储（storage）、消息（message-center）、用户（user）、集成（integration）、模板（template）。",
  "公共能力抽取到 global-common-module：common-core、i18n-starter、mybatis-encrypt-starter、bff-starter、remote-starter。",

  # 模块拆分规范
  "每个微服务模块拆为 -service（实现）和 -service-remote（Feign 接口 + DTO）两个子模块。",
  "remote 模块供其他服务依赖，service 模块只部署不对外发布。版本号用 SNAPSHOT（开发）或 RELEASE（生产）。",
  "Maven 父级 POM 统一继承 fadada-starter-parent 3.3.6.RELEASE，公司基础组件通过 fadada-*-starter 自动配置。",
  "Java 8，Tomcat 9.0.99，Spring Cloud 体系（服务注册发现 + Feign 远程调用）。",

  # 数据与中间件
  "数据库用 MySQL，ORM 用 MyBatis（global-mybatis-encrypt-starter 做字段级加密）。",
  "缓存用 Redis，Token 和会话状态存 Redis（key 前缀 global_api_*）。",
  "API 网关基于 Spring Cloud Gateway + Lua 限流脚本。",
  "消息通知走 global-core-message-center-module，支持邮件/短信/站内信。",

  # 安全架构
  "认证体系：第三方 API 用 JWT（RSA 私钥签名）→ AccessToken（Redis）；SaaS 用户用 Session/Token + HeaderHolder。",
  "权限模型：账号（Account）→ 成员（Member）→ 用户（User）三层关系，AOP 注解 @RequireAdmin 做管理员校验。",
  "多站点：主站管理账户和账单，子站处理签署业务，跨站调用校验 siteSource 防止非法访问。",
  "IP 白名单：第三方 API 应用配置 IP 白名单，网关层校验。",

  # 前端架构
  "前端多端独立部署：PC（front-oversea-pc，Vue3+ElementPlus）、H5（front-oversea-h5，Vue3+Vant）、Admin（front-oversea-admin）、Portal（front-oversea-portal-pc，Nuxt3+Tailwind）。",
  "前端 Monorepo：Yarn workspaces，公共组件抽到 packages/components。",
  "构建部署用公司 @oversea/cli（fdd-dev 开发、fdd-deploy 部署），CDN 域名 gcdn.fadada.com。",
  "国际化：vue-i18n + crowdin-sync，支持 zh/cht/en/spa/ru/th 六种语言，Portal 用 @nuxtjs/i18n。",
  "CMS 内容管理用 Strapi（front-oversea-strapi）。",

  # 设计约束
  "所有对外 API 必须设计为 RESTful，请求/响应 JSON 格式，Content-Type: application/json。",
  "BFF 层做业务编排和数据聚合，不直接操作数据库；核心服务层操作数据库。",
  "跨服务调用必须走 Feign Remote 接口，禁止 HTTP 直连。",
  "新增微服务必须同时创建 -service 和 -service-remote 子模块，注册到 fadada-starter-parent。",
]

principles = [
  "服务拆分按业务域，不是按技术层。签署、账单、账户各有独立核心服务。",
  "BFF 层只做编排和适配，核心业务逻辑下沉到 core 服务。",
  "remote 模块的 DTO 变更需向后兼容，因为多个服务依赖同一 remote 版本。",
  "新增功能优先复用 global-common-module 的基础能力，不要重复造轮子。",
]
