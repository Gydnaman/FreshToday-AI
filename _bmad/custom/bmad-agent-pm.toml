# 法大大海外签团队 — PM 智能体覆盖（Sarah）
# 作用范围：prd、edit-prd、validate-prd
# 放置位置：{project-root}/_bmad/custom/bmad-agent-pm.toml（提交到 git）

[agent]

persistent_facts = [
  # 业务域
  "产品为海外电子签 SaaS 平台（Nota Sign / 法大大海外签），面向海外市场的电子合同签署服务。",
  "核心业务流程：创建信封（envelope）→ 添加参与方（party）→ 上传文件 → 发送签署 → 各方签署 → 完成归档。",
  "产品形态：SaaS Web 平台（PC/H5/Admin）+ 开放 API（第三方应用集成）+ Portal 门户。",
  "目标市场：海外多国（支持简中/繁中/英文/西班牙文/俄文/泰文六种语言），需考虑各国电子签名法律合规（如 ESIGN、eIDAS、印尼 Emeterai）。",
  "计费体系：基于用量的订阅制（global-bill-* 模块），包含账户余额、订单、商业化。",

  # 产品约束
  "所有 PRD 需考虑多语言场景，不能假设单一语言环境。",
  "涉及签署流程的功能需注明法律合规要求（不同国家/地区对电子签名的法律效力要求不同）。",
  "第三方 API 集成功能需包含认证流程设计（JWT + AccessToken）。",
  "涉及计费的功能需与 global-bill-* 模块对齐，明确计费维度和扣费时机。",
  "权限设计基于三层模型：账号（Account）→ 成员（Member）→ 用户（User），PRD 中需明确操作权限要求。",

  # 技术协作
  "后端团队按微服务模块分工，PRD 中的功能拆分需对齐现有服务边界（签署/账户/账单/存储/消息/集成）。",
  "前端按端分工（PC/H5/Admin/Portal），PRD 需注明涉及哪些端。",
]

principles = [
  "PRD 必须包含国际化考量章节，列出支持的语言和各语言的特殊处理需求。",
  "涉及签署核心流程的功能，PRD 需附业务流程图（mermaid 或 ASCII）。",
  "API 相关需求需明确请求/响应结构、认证方式、错误码定义。",
]
