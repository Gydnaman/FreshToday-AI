# 法大大海外签团队 — UX设计工作流覆盖
# 放置位置：{project-root}/_bmad/custom/bmad-ux.toml（提交到 git）

[workflow]

persistent_facts = [
  "PC 端基于 Element Plus 2.9+，H5 端基于 Vant 4.9+，Portal 基于 Nuxt 3 + @nuxt/ui + Tailwind——设计稿需标注对应组件名。",
  "UI 必须支持六种语言（zh/cht/en/spa/ru/th），设计需考虑文案长度差异（泰文/俄文比中文长 30-50%）。",
  "核心签署流程：上传文件 → 添加签署方 → 拖拽签署位 → 预览 → 发送 → 各方签署 → 完成，设计需突出状态流转。",
  "签名方式：手写签名（drauu/signature_pad）、上传图片签名、电子印章（seal）——设计需覆盖三种交互。",
  "权限控制：UI 元素需支持 v-permission 指令隐藏/禁用，设计稿需标注权限要求。",
  "所有界面文案通过 i18n.global.t('key') 调用，设计稿需标注 i18n key 而非硬编码文字。",
  "日期/时间/货币需按 locale 格式化，不能硬编码格式。",
]

# 终审评审器：追加多语言和移动端评审
finalize_reviewers = [
  "多语言适配评审：检查设计在六种语言下的布局可用性，长文案场景的截断/换行处理，RTL 预留余地。",
  "移动端评审（仅 H5）：检查触控交互优化，签名区域是否足够大，手势操作是否流畅。",
]
