# 法大大海外签团队 — 验证PRD工作流覆盖
# 放置位置：{project-root}/_bmad/custom/bmad-validate-prd.toml（提交到 git）

[workflow]

persistent_facts = [
  "PRD 验证维度需包含：国际化完整性（六语言覆盖）、合规覆盖（目标国家法规）、技术可行性（微服务边界）、计费一致性。",
  "验证需检查 PRD 是否标注涉及的前端端和后端微服务模块，缺失则标记为 gap。",
  "验证需确认 API 相关需求是否定义了认证方式（JWT+AccessToken）和错误码（i18n 枚举）。",
  "验证报告需按多语言维度单独列出风险项，便于团队评估海外发布风险。",
]
